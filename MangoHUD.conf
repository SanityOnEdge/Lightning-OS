################### LIGHTNING-OS V3.6.2 MONITOR ###################
# Podstawowa konfiguracja wyglądu
legacy_layout=0
background_alpha=0.5
round_corners=10
background_color=000000
font_size=24
text_color=FFFFFF
position=top-left
toggle_hud=Shift_R+F1

# --- STATUS SYSTEMU LIGHTNING-OS ---
custom_text=MODE:
exec=cat /tmp/lightning_status

# --- SEKCJA GPU (ZIELONY - NVIDIA STYLE) ---
gpu_stats
gpu_text=GPU
gpu_color=00FF00
gpu_core_clock
gpu_mem_clock
gpu_temp
gpu_power
gpu_load_change
vram
vram_color=00FF00

# --- SEKCJA CPU (NIEBIESKI) ---
cpu_stats
cpu_text=CPU
cpu_color=0000FF
cpu_mhz
cpu_temp
cpu_power
cpu_load_change

# --- PAMIĘĆ I ZASOBY ---
ram
ram_color=00FFFF
io_read
io_write
io_color=FFFF00
swap

# --- WYDAJNOŚĆ I PŁYNNOŚĆ ---
fps
fps_metrics=avg,0.01
frame_timing
frametime_color=FFFFFF
fps_limit=48,120,60,0
toggle_fps_limit=Shift_L+F1
vsync=1
gl_vsync=0

# --- INFORMACJE O SILNIKU ---
gamemode
vkbasalt
arch
wine
winesync
engine
resolution
refresh_rate

# --- ZEGAR ---
time
time_no_label
